<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&#20491;&#20154;&#21161;&#29702;&#20837;&#21475;</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #172033;
        --muted: #667085;
        --line: #d8dee8;
        --accent: #0f766e;
        --accent-2: #2563eb;
        --soft: #ecfdf5;
        --soft-2: #eff6ff;
        --danger: #b42318;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .status {
        min-width: 116px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px 10px;
        color: var(--muted);
        background: #fff;
        text-align: center;
        font-size: 14px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .card {
        display: flex;
        flex-direction: column;
        min-height: 220px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px;
      }

      .bill {
        border-top: 4px solid var(--accent);
      }

      .invest {
        border-top: 4px solid var(--accent-2);
      }

      .eyebrow {
        display: inline-flex;
        width: fit-content;
        align-items: center;
        border-radius: 999px;
        padding: 4px 8px;
        background: var(--soft);
        color: #047857;
        font-size: 13px;
        font-weight: 700;
      }

      .invest .eyebrow {
        background: var(--soft-2);
        color: #1d4ed8;
      }

      h2 {
        margin: 16px 0 8px;
        font-size: 24px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
        margin-top: auto;
        padding-top: 18px;
      }

      a.button {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        padding: 10px 14px;
        text-decoration: none;
        font-weight: 700;
        color: #fff;
        background: var(--accent);
      }

      .invest a.button {
        background: var(--accent-2);
      }

      a.secondary {
        border: 1px solid var(--line);
        color: var(--text);
        background: #fff;
      }

      .empty {
        border: 1px dashed #f04438;
        color: var(--danger);
        background: #fff5f5;
      }

      section {
        margin-top: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      code {
        border-radius: 6px;
        padding: 2px 6px;
        background: #eef2ff;
        color: #3730a3;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 24px, 920px);
          padding-top: 18px;
        }

        header {
          display: block;
        }

        .status {
          width: 100%;
          margin-top: 14px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>&#20491;&#20154;&#21161;&#29702;&#20837;&#21475;</h1>
          <p>&#36889;&#35041;&#26159;&#20320;&#30340; Telegram &#32317;&#20837;&#21475;&#65292;&#20063;&#21487;&#20197;&#30452;&#25509;&#20999;&#25563;&#21040;&#21508;&#20491;&#21161;&#29702;&#30340; PWA&#12290;</p>
        </div>
        <div class="status" id="status">&#36617;&#20837;&#20013;</div>
      </header>

      <div class="grid">
        <article class="card bill">
          <span class="eyebrow">&#32371;&#36027;</span>
          <h2>&#32371;&#36027;&#21161;&#29702;</h2>
          <p>&#26597;&#30475;&#25509;&#19979;&#20358;&#35201;&#32371;&#30340;&#27700;&#12289;&#38651;&#12289;&#29926;&#26031;&#12289;&#20449;&#29992;&#21345;&#12289;&#25151;&#36024;&#21644;&#35330;&#38321;&#36027;&#29992;&#12290;</p>
          <div class="actions">
            <a class="button" id="billLink" href="#" aria-disabled="true">&#38283;&#21855;&#32371;&#36027; PWA</a>
            <a class="button secondary" href="https://t.me/" target="_blank" rel="noreferrer">&#21040; Telegram &#36664;&#20837; /bill</a>
          </div>
        </article>

        <article class="card invest">
          <span class="eyebrow">&#25237;&#36039;</span>
          <h2>&#25237;&#36039;&#21161;&#29702;</h2>
          <p>&#22238;&#21040;&#20320;&#21407;&#26412;&#30340;&#25237;&#36039;&#21161;&#29702;&#65292;&#26597;&#30475;&#25345;&#32929;&#12289;&#31574;&#30053;&#21644;&#25237;&#36039;&#30456;&#38364;&#25552;&#37266;&#12290;</p>
          <div class="actions">
            <a class="button" id="investLink" href="#" aria-disabled="true">&#38283;&#21855;&#25237;&#36039; PWA</a>
            <a class="button secondary" href="https://t.me/" target="_blank" rel="noreferrer">&#21040; Telegram &#36664;&#20837; /invest</a>
          </div>
        </article>
      </div>

      <section>
        <p>Telegram &#25351;&#20196;&#65306;<code>/help</code> &#12289;<code>/bill</code> &#12289;<code>/bill week</code> &#12289;<code>/invest</code></p>
      </section>
    </main>

    <script>
      const statusEl = document.querySelector("#status");
      const billLink = document.querySelector("#billLink");
      const investLink = document.querySelector("#investLink");

      function wireLink(element, value) {
        if (!value || value === "https://example.com") {
          element.classList.add("empty");
          element.textContent = "\u5c1a\u672a\u8a2d\u5b9a\u7db2\u5740";
          return false;
        }
        element.href = value;
        element.target = "_blank";
        element.rel = "noreferrer";
        element.removeAttribute("aria-disabled");
        return true;
      }

      async function loadLinks() {
        try {
          const response = await fetch("/api/app-links", { cache: "no-store" });
          if (!response.ok) throw new Error("load failed");
          const data = await response.json();
          const billOk = wireLink(billLink, data.billAssistantUrl);
          const investOk = wireLink(investLink, data.investAssistantUrl);
          statusEl.textContent = billOk && investOk ? "\u5df2\u9023\u7dda" : "\u9700\u88dc\u7db2\u5740";
        } catch (error) {
          statusEl.textContent = "\u8f09\u5165\u5931\u6557";
          billLink.classList.add("empty");
          investLink.classList.add("empty");
        }
      }

      loadLinks();
    </script>
  </body>
</html>
