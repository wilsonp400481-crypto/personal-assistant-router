<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personal Assistant Router</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #172033;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        padding: 24px;
      }
      code {
        background: #eef2ff;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>個人助理 Telegram Router</h1>
      <p>這個站點負責把 Telegram 指令分流到不同助理。</p>
      <p><code>/bill</code> 轉到繳費助理。</p>
      <p><code>/invest</code> 轉到投資助理。</p>
      <p><code>/help</code> 顯示總入口說明。</p>
    </main>
  </body>
</html>
